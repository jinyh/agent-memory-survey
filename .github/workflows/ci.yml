name: CI

on:
  push:
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run --active --extra dev pytest tests/

      - name: Run lint
        run: uv run --active --extra dev ruff check .

      - name: Check docs links
        run: python scripts/check-doc-links.py
